name: Post PR review requests to Discord

on:
  pull_request:
    types: [review_requested]

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Send PR review request to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_PR }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          REPO_NAME: ${{ github.repository }}
          REQUESTED_REVIEWER: ${{ github.event.requested_reviewer.login }}
          REQUESTED_TEAM: ${{ github.event.requested_team.name }}
        run: |
          TARGET="${REQUESTED_REVIEWER:-$REQUESTED_TEAM}"
          TARGET="${TARGET:-someone}"

          jq -n \
            --arg repo "$REPO_NAME" \
            --arg number "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg author "$PR_AUTHOR" \
            --arg base "$PR_BASE" \
            --arg head "$PR_HEAD" \
            --arg url "$PR_URL" \
            --arg target "$TARGET" \
            '{
              username: "GitHub PR Review Requests",
              embeds: [
                {
                  title: ("🔔 Review requested on PR #" + $number + " - " + $title),
                  url: $url,
                  description: (
                    "Repo: **" + $repo + "**\n" +
                    "Author: **" + $author + "**\n" +
                    "Branch: **" + $head + " → " + $base + "**\n" +
                    "Requested reviewer: **" + $target + "**"
                  )
                }
              ]
            }' > payload.json

          curl -H "Content-Type: application/json" \
               -X POST \
               -d @payload.json \
               "$DISCORD_WEBHOOK_URL"
